name: CI/CD Pipeline

on:
  push:
    branches: [ "develop" ]
  pull_request:

jobs:
  test-lint:
    name: Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Run ESLint
        run: npx eslint .
        working-directory: backend

      - name: Run tests (Jest)
        run: npm test
        working-directory: backend

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build backend image
        run: docker build -t ghcr.io/${{ github.repository }}/backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t ghcr.io/${{ github.repository }}/frontend:${{ github.sha }} ./frontend

      - name: Push backend image
        run: docker push ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

      - name: Push frontend image
        run: docker push ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run containers with docker-compose
        run: docker compose up -d

      - name: Health check backend
        run: |
          sleep 10
          curl --fail http://localhost:3000/health





          